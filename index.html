<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spiceroad Online — Launching Soon</title>
  <meta name="description" content="Spiceroad Online — premium Silkroad Online private server resources. Launching soon." />
  <style>
    :root {
      --text: #f4e0bd;
      --muted: #d8b88f;
      --gold: #f3c27b;
      --gold-2: #d98b33;
      --line-2: rgba(243, 194, 123, 0.34);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: #060403;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto auto;
      justify-items: center;
      text-align: center;
      padding: 48px 24px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 220, 159, 0.08) 0.7px, transparent 1px);
      background-size: 4px 4px;
      opacity: 0.25;
      mix-blend-mode: screen;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(6, 4, 3, 0.55), rgba(6, 4, 3, 0.75)),
        radial-gradient(ellipse at 50% 30%, rgba(243, 194, 123, 0.10), transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(217, 139, 51, 0.08), transparent 60%);
      z-index: 0;
    }
    body {
      background-image: url('background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }
    .hero {
      position: relative;
      z-index: 1;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .bottom {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding-bottom: 16px;
    }
    .logo {
      width: min(360px, 80vw);
      height: auto;
      filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.6));
      margin-bottom: 20px;
    }
    h1 {
      margin: 8px 0 14px;
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 500;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid rgba(220, 225, 235, 0.45);
      background: linear-gradient(180deg, rgba(70, 78, 90, 0.55), rgba(18, 20, 24, 0.92));
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #e8ecf2;
      text-transform: uppercase;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04),
        0 6px 18px rgba(0, 0, 0, 0.45),
        0 0 18px rgba(200, 210, 225, 0.10);
      margin: 0 0 28px;
    }
    .kicker::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #dfe4ec;
      box-shadow: 0 0 10px rgba(223, 228, 236, 0.8);
    }
    p.lead {
      margin: 0 0 32px;
      color: #f0d5ae;
      font-size: 1.14rem;
      line-height: 1.8;
    }
    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 24px;
      border-radius: 8px;
      border: 1px solid var(--line-2);
      background: linear-gradient(180deg, rgba(35, 20, 10, 0.44), rgba(12, 7, 4, 0.92));
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 12px 30px rgba(0, 0, 0, 0.22);
      transition: 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 226, 181, 0.16), transparent);
      transform: translateX(-120%);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.04),
        0 18px 34px rgba(0, 0, 0, 0.3),
        0 0 18px rgba(217, 139, 51, 0.18);
    }
    .btn:hover::before {
      transform: translateX(120%);
      transition: 0.7s ease;
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.015);
      border-color: rgba(243, 194, 123, 0.32);
      color: #f7e1bc;
      box-shadow: none;
    }
    .btn-ghost:hover {
      background: rgba(243, 194, 123, 0.08);
      border-color: rgba(243, 194, 123, 0.68);
      box-shadow: 0 0 18px rgba(243, 194, 123, 0.18);
    }
    footer {
      position: relative;
      z-index: 1;
      color: var(--muted);
      opacity: 0.6;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <main class="hero">
    <img class="logo" src="logo-original.png" alt="Spiceroad Online" />
    <span class="kicker">Coming Soon</span>
  </main>
  <div class="bottom">
    <div class="actions">
      <a class="btn" href="https://platform.spiceroad.online">Enter Platform</a>
    </div>
  </div>
  <footer>&copy; CodexCaravan. All rights reserved.</footer>
</body>
</html>
